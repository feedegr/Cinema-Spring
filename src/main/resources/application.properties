spring.application.name=fede-proyecto-cine
server.port=8080

# Datasource (PostgreSQL). Los defaults valen para correr local con `mvnw spring-boot:run`
# contra el Postgres de docker-compose (puerto publicado a localhost). Dentro de docker-compose,
# el servicio "app" recibe DB_HOST=db (nombre del servicio) y estas mismas properties sirven sin cambios.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cine_db}
spring.datasource.username=${DB_USER:cine_user}
spring.datasource.password=${DB_PASSWORD:cine_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# ddl-auto=update: comodo para desarrollo (Hibernate crea/actualiza tablas segun las entidades),
# pero no apto para produccion (posible drift de esquema). Migrar a Flyway/Liquibase cuando el modelo se estabilice.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Permite que data.sql corra contra PostgreSQL (no solo bases embebidas) y despues
# de que Hibernate cree las tablas segun las entidades.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
